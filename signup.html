<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AdCrux — Create account</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#080810; --surface:#0E0E1A; --card:#131320; --border:#1C1C2E;
    --muted:#252540; --text:#EEEEF5; --sub:#6B6B8A; --hint:#3A3A55;
    --accent:#00E5BE; --accent2:#00B896; --error:#EF4444;
  }
  html,body { font-family:'DM Sans',-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image: linear-gradient(var(--border) 1px,transparent 1px), linear-gradient(90deg,var(--border) 1px,transparent 1px);
    background-size:48px 48px;
    mask-image:radial-gradient(ellipse 80% 80% at 50% 0%, black 30%, transparent 100%);
    opacity:.4;
  }
  body::after {
    content:''; position:fixed; top:0; left:50%; transform:translateX(-50%);
    width:600px; height:300px; pointer-events:none; z-index:0;
    background:radial-gradient(ellipse,rgba(0,229,190,.06) 0%,transparent 70%);
  }
  .page { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; }
  .logo { margin-bottom:36px; text-decoration:none; display:block; }
  .card { width:100%; max-width:420px; background:var(--card); border:1px solid var(--border); border-radius:18px; padding:36px 32px; box-shadow:0 40px 80px rgba(0,0,0,.4); }
  .card-title { font-size:22px; font-weight:700; letter-spacing:-.02em; margin-bottom:6px; }
  .card-sub { font-size:14px; color:var(--sub); margin-bottom:24px; line-height:1.5; }
  .field { margin-bottom:16px; }
  label { display:block; font-size:12px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; color:var(--sub); margin-bottom:7px; }
  input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:9px; color:var(--text); font-family:inherit; font-size:15px; padding:11px 14px; outline:none; transition:border-color .15s,box-shadow .15s; }
  input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,229,190,.12); }
  input::placeholder { color:var(--hint); }
  .btn { width:100%; padding:13px; background:var(--accent); color:#080810; border:none; border-radius:9px; font-family:inherit; font-size:15px; font-weight:700; cursor:pointer; margin-top:6px; transition:background .15s,transform .1s; }
  .btn:hover { background:var(--accent2); transform:translateY(-1px); }
  .btn:active { transform:translateY(0); }
  .btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
  .divider { border:none; border-top:1px solid var(--border); margin:24px 0; }
  .link-row { text-align:center; font-size:14px; color:var(--sub); }
  .link-row a { color:var(--accent); text-decoration:none; font-weight:600; }
  .link-row a:hover { text-decoration:underline; }
  .alert { border-radius:8px; padding:10px 14px; font-size:13px; line-height:1.5; margin-bottom:16px; display:none; }
  .alert.error   { background:rgba(239,68,68,.1);  border:1px solid rgba(239,68,68,.3);  color:#FCA5A5; }
  .alert.success { background:rgba(0,229,190,.1);  border:1px solid rgba(0,229,190,.3);  color:var(--accent); }
  .alert.show    { display:block; }
  .plan-badge { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 14px; font-size:12px; color:var(--sub); margin-bottom:20px; display:flex; align-items:center; gap:8px; }
  .plan-dot { width:7px; height:7px; border-radius:50%; background:var(--accent); flex-shrink:0; animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }
  .terms { font-size:11px; color:var(--hint); text-align:center; margin-top:16px; line-height:1.5; }
  .terms a { color:var(--sub); }
</style>
</head>
<body>
<div class="page">

  <a href="https://getadcrux.com" class="logo">
    <svg width="120" height="30" viewBox="0 0 120 30" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs><radialGradient id="sg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#00E5BE" stop-opacity=".25"/><stop offset="100%" stop-color="#00E5BE" stop-opacity="0"/></radialGradient></defs>
      <text x="0" y="23" font-family="DM Sans,-apple-system,sans-serif" font-weight="800" font-size="26" letter-spacing="-0.6" fill="#3D5270">Ad</text>
      <text x="34" y="23" font-family="DM Sans,-apple-system,sans-serif" font-weight="800" font-size="26" letter-spacing="-0.6" fill="#F1F5F9">Cru</text>
      <circle cx="88" cy="13" r="11" fill="url(#sg)"/>
      <line x1="81" y1="6" x2="95" y2="20" stroke="#1A3250" stroke-width="3.8" stroke-linecap="round"/>
      <line x1="95" y1="6" x2="81" y2="20" stroke="#1A3250" stroke-width="3.8" stroke-linecap="round"/>
      <circle cx="88" cy="13" r="4.8" fill="#00E5BE" fill-opacity=".18"/>
      <circle cx="88" cy="13" r="3" fill="#00E5BE"/>
    </svg>
  </a>

  <div class="card">
    <div class="card-title">Create your account</div>
    <div class="card-sub">Independent marketing measurement, from day one.</div>

    <div class="plan-badge">
      <div class="plan-dot"></div>
      <span id="plan-label">14-day free trial · No credit card required</span>
    </div>

    <div id="alert" class="alert"></div>

    <form id="form" autocomplete="off">
      <div class="field">
        <label>Organisation / Agency name</label>
        <input type="text" id="org" placeholder="Acme Agency" required/>
      </div>
      <div class="field">
        <label>Work email</label>
        <input type="email" id="email" placeholder="you@company.com" required/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="pw" placeholder="8+ characters" required minlength="8"/>
      </div>
      <div class="field">
        <label>Confirm password</label>
        <input type="password" id="pw2" placeholder="Repeat password" required/>
      </div>
      <button type="submit" class="btn" id="btn">Create account →</button>
    </form>

    <p class="terms">
      By creating an account you agree to our
      <a href="https://getadcrux.com/terms">Terms</a> and
      <a href="https://getadcrux.com/privacy">Privacy Policy</a>.
    </p>
    <hr class="divider"/>
    <div class="link-row">Already have an account? <a href="/login.html">Sign in</a></div>
  </div>
</div>

<script>
const SB_URL = 'https://utqmhfzrjchbmdvfpkos.supabase.co'
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV0cW1oZnpyamNoYm1kdmZwa29zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MjQzODIsImV4cCI6MjA4OTEwMDM4Mn0.80_Dfz_SIP72Kn3QEtCV8sIJMUbYwlEIKFAcyuIC37k'
const APP    = 'https://app.getadcrux.com'
const sb     = supabase.createClient(SB_URL, SB_KEY)

// Show plan from ?plan=growth etc.
const plan = new URLSearchParams(location.search).get('plan') || ''
const labels = { starter:'Starter plan · 14-day free trial', growth:'Growth plan · 14-day free trial', agency:'Agency plan · 14-day free trial' }
if (labels[plan]) document.getElementById('plan-label').textContent = labels[plan]

function alert(msg, type) {
  const el = document.getElementById('alert')
  el.textContent = msg; el.className = `alert ${type} show`
}

document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault()
  const org   = document.getElementById('org').value.trim()
  const email = document.getElementById('email').value.trim()
  const pw    = document.getElementById('pw').value
  const pw2   = document.getElementById('pw2').value
  const btn   = document.getElementById('btn')

  if (pw !== pw2)    { alert("Passwords don't match.", 'error'); return }
  if (pw.length < 8) { alert('Password must be at least 8 characters.', 'error'); return }

  btn.disabled = true; btn.textContent = 'Creating account…'

  try {
    // 1. Sign up
    const { error: e1 } = await sb.auth.signUp({ email, password: pw })
    if (e1 && !e1.message.includes('already registered')) throw e1

    // 2. Sign in to get session
    const { data, error: e2 } = await sb.auth.signInWithPassword({ email, password: pw })
    if (e2) throw e2

    const { session, user } = data

    // 3. Create account via RPC (same as db.py)
    await sb.rpc('create_account_for_user', {
      p_user_id:      user.id,
      p_account_name: org,
    }).catch(() => {}) // OK if already exists

    // 4. Redirect to app with tokens
    alert('Account created! Redirecting…', 'success')
    setTimeout(() => {
      location.href = `${APP}?access_token=${encodeURIComponent(session.access_token)}&refresh_token=${encodeURIComponent(session.refresh_token)}`
    }, 700)

  } catch (err) {
    const msg = err.message || ''
    alert(msg.includes('already registered')
      ? 'This email is already registered. <a href="/login.html">Sign in instead</a>.'
      : msg || 'Something went wrong. Please try again.', 'error')
    btn.disabled = false; btn.textContent = 'Create account →'
  }
})
</script>
</body>
</html>
